name: Post Vercel Preview URL

on:
  deployment_status:

permissions:
  pull-requests: write

jobs:
  post-url:
    if: >
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment.environment, 'Preview')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.deployment.sha;
            const url = context.payload.deployment_status.environment_url;
            if (!url) return;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50
            });

            const pr = prs.find(p => p.head.sha === sha);
            if (!pr) return;

            const marker = '<!-- vercel-preview-bot -->';
            const body = [
              marker,
              '## Vercel Preview',
              '',
              url,
              '',
              `*Commit: \`${sha.slice(0, 7)}\`*`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
            }
